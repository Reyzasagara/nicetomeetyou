<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Required</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e6e6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .lock-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .lock-icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #4a9eff;
        }
        p {
            color: #999;
            margin-bottom: 32px;
            font-size: 14px;
            line-height: 1.6;
        }
        .input-group {
            position: relative;
            margin-bottom: 24px;
        }
        input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #e6e6e6;
            font-size: 16px;
            transition: all 0.3s;
            text-align: center;
            letter-spacing: 2px;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #4a9eff;
            background: rgba(74,158,255,0.08);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4a9eff 0%, #3a7bd5 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74,158,255,0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .error.show {
            opacity: 1;
        }
        .hint {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="lock-container">
        <div class="lock-icon">🔐</div>
        <h1>Access Required</h1>
        <p>This is a private study tool. Please enter your access code to continue.</p>
        
        <div class="input-group">
            <input 
                type="password" 
                id="passwordInput" 
                placeholder="Enter code"
                autocomplete="off"
                spellcheck="false"
            >
        </div>
        
        <button onclick="checkPassword()">Unlock</button>
        
        <div class="error" id="error">❌ Incorrect code. Try again.</div>
        
        <div class="hint">
            💡 Hint: Your personal study password
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Change this password!
        // This is NOT secure - it's just basic protection against casual visitors
        // For real security, use server-side authentication
        const CORRECT_PASSWORD = 'study2026'; // 👈 CHANGE THIS!

        const input = document.getElementById('passwordInput');
        const error = document.getElementById('error');

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        function checkPassword() {
            const entered = input.value;
            
            if (entered === CORRECT_PASSWORD) {
                // Success! Redirect to the actual app
                window.location.href = 'app.html'; // 👈 Rename index.html to app.html
            } else {
                // Wrong password
                error.classList.add('show');
                input.value = '';
                input.style.borderColor = '#ff6b6b';
                
                setTimeout(() => {
                    error.classList.remove('show');
                    input.style.borderColor = 'rgba(255,255,255,0.1)';
                }, 2000);
            }
        }

        // Focus input on load
        window.onload = () => input.focus();
    </script>
</body>
</html>
